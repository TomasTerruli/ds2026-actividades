    <h2>Contactame!</h2>
    <form action="">
        <fieldset>
            <legend>Completa con tus datos.</legend>

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu Nombre" required minlength="2" maxlength="30" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+"> 
            
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Tu Apellido" required minlength="2" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+">
            
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tuemail@gmail.com" required>
           
            <label for="motivo">Motivo</label>
            <input type="text" id="motivo" placeholder="Escribí el motivo del contacto.." required>


        </fieldset>

        <button type="submit">Enviar</button>
    </form>
</body>
