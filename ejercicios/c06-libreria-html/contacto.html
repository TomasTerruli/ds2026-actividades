<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg  navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"> 📖 MiBiblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link" href="catalogo.html">Catalogo</a>
                <a class="nav-link active" aria-current="page" href="contacto.html">Contacto</a>
            </div>
            </div>
        </div>
    </nav>
    

<main class="container my-5">

    <section class="text-center mb-4">
      <h1 class="fw-bold">Contacto</h1>
      <p class="lead">Completá el formulario y nos comunicaremos con vos.</p>
    </section>

    <section class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <form class="p-4 rounded shadow bg-white">

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input 
              type="text" 
              class="form-control" 
              id="nombre" 
              name="nombre" 
              placeholder="Ingresá tu nombre"
              required
            >
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control" 
              id="email" 
              name="email" 
              placeholder="ejemplo@mail.com"
              required
            >
          </div>

          <div class="mb-3">
            <label for="asunto" class="form-label">Asunto</label>
            <select class="form-select" id="asunto" name="asunto" required>
              <option value="">Seleccioná una opción</option>
              <option value="consulta">Consulta</option>
              <option value="reclamo">Reclamo</option>
              <option value="sugerencia">Sugerencia</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea 
              class="form-control" 
              id="mensaje" 
              name="mensaje" 
              rows="5" 
              placeholder="Escribí un mensaje"
              required
            ></textarea>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-hero btn-lg">
              Enviar
            </button>
          </div>

        </form>

      </div>
    </section>

  </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
